<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Planner | Beast Mode</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div id="bgContainer" class="bg-container"></div>
    <div class="bg-overlay"></div>

    <header>
        <h1>PRO PLANNER</h1>
        <div style="display: flex; gap: 15px; align-items: center;">
            <span id="streakCount" class="streak-badge">0</span>🔥
            <div class="dropdown-container">
                <button class="action-btn dropdown-btn" onclick="toggleDropdown(event)">MENU ▼</button>
                <div id="dataDropdown" class="dropdown-menu">
                    <button class="dropdown-item" onclick="openModal('settingsModal')">⚙️ SETTINGS</button>
                    <button class="dropdown-item" onclick="openModal('statsModal')">📊 STATS</button>
                    <button class="dropdown-item" onclick="openModal('examModal')">🎯 EXAMS</button>
                    <button class="dropdown-item" onclick="manualArchive()">📦 ARCHIVE MONTH</button>
                    <button class="dropdown-item" onclick="exportBackup()">💾 BACKUP</button>
                    <label class="dropdown-item" style="cursor: pointer;">
                        📂 IMPORT <input type="file" id="importFile" style="display:none;" onchange="importBackup(event)">
                    </label>
                    <button id="authBtnModal" class="dropdown-item" onclick="toggleAuth()">🔒 LOGIN</button>
                </div>
            </div>
        </div>
    </header>

    <div class="quote-banner" id="quoteBanner">"LOADING..."</div>

    <div style="text-align: center; margin-top: 20px;">
        <div class="timer-mode">
            <button id="btnWork" class="mode-btn active" onclick="setTimerMode('work')">WORK (25m)</button>
            <button id="btnBreak" class="mode-btn" onclick="setTimerMode('break')">BREAK (5m)</button>
        </div>
        <div id="timerDisplay" class="timer-display">25:00</div>
        <div class="timer-controls">
            <button id="btnTimerStart" class="action-btn accent" onclick="toggleTimer()">START</button>
            <button class="action-btn" onclick="resetTimer()">RESET</button>
        </div>
    </div>

    <div class="daily-wrapper">
        <div id="navControlsRow" class="controls-row nav-controls">
            <div class="date-selector-area draggable-nav" id="nav-day">
                <button class="arrow" onclick="scrollTimeline(-400)">❮</button>
                <input type="date" id="datePicker">
                <button class="add-btn" onclick="createDay()">ADD DAY</button>
                <button class="arrow" onclick="scrollTimeline(400)">❯</button>
            </div>
            <div class="date-selector-area draggable-nav" id="nav-month">
                <input type="month" id="monthPicker">
                <button class="add-btn" onclick="createMonth()">ADD MONTH</button>
            </div>
        </div>

        <div id="daily-container"></div>
    </div>

    <div class="bottom-goals">
        <div class="card" style="min-height: 250px;">
            <div class="card-header"><h3>📌 MONTHLY GOALS</h3></div>
            <div class="input-group">
                <input type="text" id="in-month" placeholder="NEW GOAL..." onkeydown="if(event.key==='Enter') addGoal('month')">
                <button class="add-btn" onclick="addGoal('month')">+</button>
            </div>
            <ul id="list-month"></ul>
        </div>
        <div class="card" style="min-height: 250px;">
            <div class="card-header"><h3>🎯 YEARLY GOALS</h3></div>
            <div class="input-group">
                <input type="text" id="in-year" placeholder="NEW GOAL..." onkeydown="if(event.key==='Enter') addGoal('year')">
                <button class="add-btn" onclick="addGoal('year')">+</button>
            </div>
            <ul id="list-year"></ul>
        </div>
        <div class="card" style="min-height: 250px;">
            <div class="card-header"><h3>📂 ARCHIVES</h3></div>
            <div id="report-list" style="flex-grow:1; overflow-y:auto; padding-right:5px;"></div>
        </div>
    </div>

    <div id="settingsModal" class="modal-overlay" onclick="if(event.target===this) closeModal('settingsModal')">
        <div class="modal-card">
            <h2>⚙️ SETTINGS</h2>
            <div style="overflow-y: auto; padding-right: 10px; flex-grow: 1; max-height: 60vh;">
                <div style="text-align: center; font-size: 0.7rem; color: var(--done-green); margin-bottom: 20px;" id="syncStatus">Sync is paused.</div>
                
                <div class="setting-row">
                    <label>THEME COLOR</label>
                    <div class="color-picker">
                        <div class="color-swatch active" style="background: #a29bfe;" onclick="setThemeColor('#a29bfe', this)"></div>
                        <div class="color-swatch" style="background: #ff7675;" onclick="setThemeColor('#ff7675', this)"></div>
                        <div class="color-swatch" style="background: #55efc4;" onclick="setThemeColor('#55efc4', this)"></div>
                        <div class="color-swatch" style="background: #fdcb6e;" onclick="setThemeColor('#fdcb6e', this)"></div>
                    </div>
                </div>
                <div class="setting-row">
                    <label>BACKGROUND DIM</label>
                    <input type="range" id="bgDimSlider" min="0" max="0.9" step="0.1" value="0.6" oninput="updateDimming()">
                </div>
                <div class="setting-row">
                    <label>WORK DURATION (MINS)</label>
                    <input type="number" id="workTimeInput" style="width: 60px; text-align: center;" value="25">
                </div>
                <div class="setting-row">
                    <label>BREAK DURATION (MINS)</label>
                    <input type="number" id="breakTimeInput" style="width: 60px; text-align: center;" value="5">
                </div>
                <div class="setting-row">
                    <label>SOUND ALARM</label>
                    <div class="custom-checkbox checked" id="soundToggleCheck" onclick="toggleSettingsCheck('soundToggle')"></div>
                    <input type="checkbox" id="soundToggle" checked style="display: none;">
                </div>
                <div class="setting-row">
                    <label>ALARM TYPE</label>
                    <select id="soundTypeSelect" onchange="testSound()">
                        <option value="classic">CLASSIC BEEP</option>
                        <option value="chime">SOFT CHIME</option>
                        <option value="digital">DIGITAL WATCH</option>
                        <option value="chord">SUCCESS CHORD</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>DESKTOP NOTIFICATIONS</label>
                    <div class="custom-checkbox" id="notifToggleCheck" onclick="toggleSettingsCheck('notifToggle'); requestNotificationPermission();"></div>
                    <input type="checkbox" id="notifToggle" style="display: none;">
                </div>
                
                <div class="setting-row" style="flex-direction: column; align-items: flex-start; gap: 8px; margin-top: 15px;">
                    <label style="font-weight: 900;">CUSTOM WORK END MSG</label>
                    <input type="text" id="workMsgInput" style="width: 100%;" value="TIME FOR A BREAK! ☕">
                </div>
                <div class="setting-row" style="flex-direction: column; align-items: flex-start; gap: 8px;">
                    <label style="font-weight: 900;">CUSTOM BREAK END MSG</label>
                    <input type="text" id="breakMsgInput" style="width: 100%;" value="BACK TO WORK! 🚀">
                </div>

                <div class="setting-row" style="flex-direction: column; align-items: flex-start; gap: 8px; margin-top: 15px;">
                    <label style="font-weight: 900; letter-spacing: 1px; color: var(--primary);">CUSTOM 100% COMPLETION MSG</label>
                    <textarea id="hundredMsgInput" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: white; font-weight: 800; font-family: inherit; resize: vertical; min-height: 60px;" placeholder="Type your aggressive motivation here..."></textarea>
                </div>

                <div style="border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0; padding-top: 20px;">
                    <label style="font-weight: 900; font-size: 0.75rem; color: var(--primary); display: block; margin-bottom: 10px;">CUSTOM ALARM / REMINDER</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="customRemMsg" placeholder="MSG (E.G. DRINK WATER)" style="flex-grow: 1;">
                        <input type="number" id="customRemTime" placeholder="MIN" style="width: 60px; text-align: center;">
                        <button class="action-btn accent" onclick="setCustomReminder()">START</button>
                    </div>
                </div>
            </div>
            <button class="action-btn accent" style="width: 100%; padding: 12px; margin-top: 15px;" onclick="saveSettings(); closeModal('settingsModal')">SAVE & CLOSE SETTINGS</button>
        </div>
    </div>

    <div id="reportModal" class="modal-overlay" onclick="if(event.target===this) closeModal('reportModal')">
        <div class="modal-card">
            <h2 id="reportModalTitle">📊 REPORT</h2>
            <div id="reportModalContent"></div>
            <button class="action-btn accent" style="width: 100%; padding: 12px;" onclick="closeModal('reportModal')">CLOSE REPORT</button>
        </div>
    </div>

    <div id="statsModal" class="modal-overlay" onclick="if(event.target===this) closeModal('statsModal')">
        <div class="modal-card">
            <h2>📈 WEEKLY STATS</h2>
            <div id="statsContent" style="display:flex; flex-wrap:wrap; gap:20px; align-items:center;"></div>
            <button class="action-btn accent" style="width: 100%; padding: 12px; margin-top:20px;" onclick="closeModal('statsModal')">CLOSE</button>
        </div>
    </div>

    <div id="examModal" class="modal-overlay" onclick="if(event.target===this) closeModal('examModal')">
        <div class="modal-card">
            <h2>🎯 EXAM TRACKER</h2>
            <div class="input-group" style="margin-bottom: 20px;">
                <input type="text" id="examName" placeholder="EXAM NAME...">
                <input type="date" id="examDate">
                <button class="add-btn" onclick="addExam()">+</button>
            </div>
            <div id="examList" style="flex-grow: 1; max-height: 40vh; overflow-y: auto;"></div>
            <button class="action-btn accent" style="width: 100%; padding: 12px; margin-top: 20px;" onclick="closeModal('examModal')">CLOSE</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
